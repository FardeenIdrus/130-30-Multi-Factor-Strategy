# Streamlit dashboard — connects to the platform Postgres started by the root docker-compose.yml.
# Prerequisites: docker compose up -d (from repo root)
# Usage: docker compose up --build

services:

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    ports:
      - "8501:8501"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5439
      DB_NAME: fift
      DB_USER: postgres
      DB_PASSWORD: postgres
